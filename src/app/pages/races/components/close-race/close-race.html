<mat-card>
  <h2>Cerrar carrera</h2>

  <form [formGroup]="form">

    <div formArrayName="result">
      @for (ctrl of resultArray.controls; track $index) {
        <div [formGroupName]="$index" class="row">

          <mat-form-field appearance="outline">
            <mat-label>Piloto</mat-label>
            <mat-select formControlName="pilot" >
              @for (p of data.pilots; track p._id) {
                <mat-option [value]="p._id">
                  {{ p.name }}
                </mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Posición</mat-label>
            <input matInput type="number" formControlName="position" />
          </mat-form-field>

        </div>
      }
    </div>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <button
      mat-raised-button
      color="primary"
      (click)="submit()"
      [disabled]="loading"
    >
      Confirmar resultado
    </button>

  </form>
</mat-card>
