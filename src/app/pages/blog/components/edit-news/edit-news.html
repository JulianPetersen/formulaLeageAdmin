
<app-header />
<app-toolbar />

<div class="content">
    <app-menu-lateral [ngClass]="" />

    <div class="contenedor">

<mat-card>
  <mat-card-title>Editar Noticia</mat-card-title>

  <form [formGroup]="form" (ngSubmit)="save()">

    <mat-form-field appearance="outline">
      <mat-label>Título</mat-label>
      <input matInput formControlName="title">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Resumen</mat-label>
      <textarea matInput formControlName="summary"></textarea>
    </mat-form-field>

    <ckeditor
      [editor]="Editor"
      [config]="editorConfig"
      (ready)="onReady($event)"
      formControlName="content">
    </ckeditor>

    <div class="acciones">

      <mat-checkbox formControlName="published">
        Publicar
      </mat-checkbox>

      <button mat-raised-button color="primary">
        Actualizar noticia
      </button>

    </div>

  </form>
</mat-card>
        
       
    </div>
</div>
