<div class="team-card">

    <h2>Actualizar datos del equipo</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full">
            <mat-label>cantidad</mat-label>
            <input matInput formControlName="amount" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
            <mat-label>Fecha de carrera</mat-label>
            <input matInput type="datetime-local" formControlName="endDate" />
        </mat-form-field>

        
        <mat-form-field appearance="outline" class="full">
            <mat-label>Ganador del premio</mat-label>
            <input matInput formControlName="winner" />
        </mat-form-field>

        <button mat-raised-button color="primary" [disabled]="loading">
            Actualizar
        </button>

        @if(loading) {
        <mat-progress-spinner diameter="30" mode="indeterminate" />
        }

    </form>

</div>
