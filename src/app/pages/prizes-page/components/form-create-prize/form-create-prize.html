
<mat-card class="team-card">

  <h2>Agregar un Nuevo Premio </h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <mat-form-field appearance="outline" class="full">
      <mat-label>Cantidad</mat-label>
      <input matInput formControlName="amount" placeholder="Ingrese un nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Fecha de carrera</mat-label>
      <input matInput type="datetime-local" formControlName="endDate" />
    </mat-form-field>

    <button mat-raised-button color="primary" [disabled]="loading">
      Crear Premio
    </button>

    @if(loading) {
    <mat-progress-spinner diameter="30" mode="indeterminate" />
    }

  </form>

</mat-card>
