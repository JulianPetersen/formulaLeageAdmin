<div class="container">
  <h2>Nueva contraseña</h2>

  <div *ngIf="invalidToken">
    <p>El enlace es inválido o expiró ❌</p>
  </div>

  <div *ngIf="!invalidToken">
    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Nueva contraseña"
    />

    <button (click)="reset()" [disabled]="loading">
      {{ loading ? 'Guardando...' : 'Cambiar contraseña' }}
    </button>
  </div>

  <p>{{ message }}</p>
</div>
